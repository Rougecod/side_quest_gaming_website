<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Login | Side Quest Gaming Center</title>
    <meta name="description" content="Sign in or create your Side Quest Gaming Center account to book sessions.">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .login-card {
            width:100%; max-width:440px;
            background:var(--bg-card);
            border:1px solid var(--border-color);
            border-radius:var(--radius-lg);
            padding:40px 32px;
            position:relative;
        }
        .login-logo {
            text-align:center; margin-bottom:28px;
        }
        .login-logo h1 {
            font-family:var(--font-heading); font-size:2.2rem; font-weight:900;
            letter-spacing:6px; color:var(--text-primary);
        }
        .login-logo p {
            font-size:13px; color:var(--text-secondary); margin-top:6px;
        }
        /* Tab switcher */
        .tab-switch {
            display:flex; gap:0; border-radius:var(--radius-sm); overflow:hidden;
            border:1px solid var(--border-color); margin-bottom:28px;
        }
        .tab-btn {
            flex:1; padding:12px; text-align:center;
            font-family:var(--font-heading); font-weight:700; font-size:13px;
            letter-spacing:1px; background:var(--bg-primary); color:var(--text-secondary);
            transition:all .2s; cursor:pointer; border:none; min-height:48px;
        }
        .tab-btn.active { background:#3B82F6; color:#fff; }
        /* Form styles */
        .login-form { display:none; }
        .login-form.active { display:block; }
        .login-form .form-group { margin-bottom:18px; }
        .login-form .form-group label {
            display:block; font-size:12px; font-weight:600;
            color:var(--text-secondary); margin-bottom:6px; letter-spacing:.5px;
        }
        .login-form .form-group input {
            width:100%; padding:14px 16px;
            background:var(--bg-primary); border:1px solid var(--border-color);
            border-radius:var(--radius-sm); color:var(--text-primary);
            font-size:15px; outline:none; transition:border-color .2s,box-shadow .2s;
            min-height:48px;
        }
        .login-form .form-group input:focus {
            border-color:#3B82F6; box-shadow:0 0 0 3px rgba(59,130,246,.1);
        }
        .btn-login {
            width:100%; padding:16px; background:#3B82F6; color:#fff;
            font-family:var(--font-heading); font-weight:800; font-size:15px;
            letter-spacing:2px; border-radius:var(--radius-xl); border:none;
            cursor:pointer; margin-top:8px;
            transition:transform .3s,box-shadow .3s; min-height:56px;
        }
        .btn-login:hover { transform:translate3d(0,-2px,0); box-shadow:0 8px 25px rgba(59,130,246,.3); }
        .btn-login:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
        .login-msg {
            text-align:center; font-size:13px; padding:10px;
            border-radius:var(--radius-sm); margin-bottom:14px; display:none;
        }
        .login-msg.error { display:block; background:rgba(255,68,68,.1); color:#ff4444; border:1px solid rgba(255,68,68,.2); }
        .login-msg.success { display:block; background:rgba(59,130,246,.1); color:#3B82F6; border:1px solid rgba(59,130,246,.2); }
        .usn-status { font-size:11px; margin-top:4px; display:block; }
        .usn-status.available { color:#22c55e; }
        .usn-status.taken { color:#ff4444; }
        /* Terms checkbox */
        .terms-check {
            display:flex; align-items:flex-start; gap:8px; margin:14px 0;
        }
        .terms-check input { margin-top:3px; accent-color:#3B82F6; }
        .terms-check label { font-size:12px; color:var(--text-secondary); line-height:1.5; }
        /* Welcome back */
        .welcome-back {
            display:none; text-align:center; padding:40px 20px;
        }
        .welcome-back h2 {
            font-family:var(--font-heading); font-size:1.5rem; font-weight:800;
            margin-bottom:8px; color:var(--text-primary);
        }
        .welcome-back p { font-size:14px; color:var(--text-secondary); margin-bottom:24px; }
        .welcome-back .btn-login { margin-top:12px; }
        .btn-secondary {
            width:100%; padding:12px; background:transparent;
            color:var(--text-secondary); font-size:13px; font-weight:600;
            border:1px solid var(--border-color); border-radius:var(--radius-xl);
            cursor:pointer; margin-top:10px; transition:all .2s;
        }
        .btn-secondary:hover { border-color:var(--text-secondary); color:var(--text-primary); }
        @media(max-width:480px) {
            .login-card { padding:28px 20px; }
            .login-logo h1 { font-size:1.8rem; }
        }
    </style>
</head>
<body>
    <div class="login-card" id="loginCard">
        <!-- Welcome Back Screen (auto-login) -->
        <div class="welcome-back" id="welcomeBack">
            <div class="login-logo">
                <h1>SIDE QUEST</h1>
            </div>
            <h2>Welcome back, <span id="wbName"></span>!</h2>
            <p>USN: <span id="wbUsn" style="color:#3B82F6;font-weight:600"></span></p>
            <button class="btn-login" id="btnContinue" onclick="continueAsUser()">CONTINUE →</button>
            <button class="btn-secondary" onclick="switchToLogin()">Sign in as someone else</button>
        </div>

        <!-- Login/Signup Forms -->
        <div id="authForms">
            <div class="login-logo">
                <h1>SIDE QUEST</h1>
                <p>Your gaming adventure starts here</p>
            </div>

            <div class="tab-switch">
                <button class="tab-btn active" data-tab="signin" onclick="switchTab('signin')">SIGN IN</button>
                <button class="tab-btn" data-tab="signup" onclick="switchTab('signup')">SIGN UP</button>
            </div>

            <div id="loginMsg" class="login-msg"></div>

            <!-- Sign In Form -->
            <form class="login-form active" id="signinForm" onsubmit="handleSignin(event)">
                <div class="form-group">
                    <label>USN / Roll Number</label>
                    <input type="text" id="siUsn" placeholder="10-digit Roll Number" maxlength="10" style="text-transform:uppercase" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Last 4 digits of Phone</label>
                    <input type="text" id="siPhone4" placeholder="XXXX" maxlength="4" pattern="\d{4}" required autocomplete="off">
                </div>
                <button type="submit" class="btn-login" id="btnSignin">SIGN IN →</button>
            </form>

            <!-- Sign Up Form -->
            <form class="login-form" id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="suName" placeholder="Enter your name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label>USN / Roll Number</label>
                    <input type="text" id="suUsn" placeholder="10-digit Roll Number" maxlength="10" style="text-transform:uppercase" required autocomplete="off">
                    <span class="usn-status" id="usnStatus"></span>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="suPhone" placeholder="+91 XXXXX XXXXX" required autocomplete="tel">
                </div>
                <div class="form-group">
                    <label>Email (Optional)</label>
                    <input type="email" id="suEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="terms-check">
                    <input type="checkbox" id="suTerms" required>
                    <label for="suTerms">I agree to Side Quest Gaming Center's terms of use and understand the session-based pricing model.</label>
                </div>
                <button type="submit" class="btn-login" id="btnSignup">CREATE ACCOUNT →</button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const API = window.CONFIG ? window.CONFIG.API_BASE : '';

        // Auto-login check
        (function() {
            const stored = localStorage.getItem('quest_user');
            if (stored) {
                try {
                    const user = JSON.parse(stored);
                    const age = Date.now() - (user._saved_at || 0);
                    if (age < 30 * 24 * 60 * 60 * 1000) { // 30 days
                        document.getElementById('wbName').textContent = user.name;
                        document.getElementById('wbUsn').textContent = user.usn;
                        document.getElementById('welcomeBack').style.display = 'block';
                        document.getElementById('authForms').style.display = 'none';
                        return;
                    }
                } catch (e) {}
                localStorage.removeItem('quest_user');
            }
        })();

        function continueAsUser() {
            window.location.href = '/';
        }

        function switchToLogin() {
            localStorage.removeItem('quest_user');
            document.getElementById('welcomeBack').style.display = 'none';
            document.getElementById('authForms').style.display = 'block';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
            document.getElementById('signinForm').classList.toggle('active', tab === 'signin');
            document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
            hideMsg();
        }

        function showMsg(text, type) {
            const el = document.getElementById('loginMsg');
            el.textContent = text;
            el.className = 'login-msg ' + type;
            el.style.display = 'block';
        }
        function hideMsg() {
            const el = document.getElementById('loginMsg');
            el.className = 'login-msg';
            el.style.display = 'none';
        }

        // USN availability check (debounced)
        let usnTimer;
        document.getElementById('suUsn').addEventListener('input', function() {
            clearTimeout(usnTimer);
            const val = this.value.trim().toUpperCase();
            const status = document.getElementById('usnStatus');
            if (val.length < 10) {
                status.textContent = val.length > 0 ? `${val.length}/10 characters` : '';
                status.className = 'usn-status';
                return;
            }
            if (!/^[A-Z0-9]{10}$/.test(val)) {
                status.textContent = 'Must be 10 alphanumeric characters';
                status.className = 'usn-status taken';
                return;
            }
            status.textContent = 'Checking...';
            status.className = 'usn-status';
            usnTimer = setTimeout(async () => {
                try {
                    const resp = await fetch(API + '/api/users/check-usn?usn=' + val);
                    const data = await resp.json();
                    if (data.available) {
                        status.textContent = '✓ USN is available';
                        status.className = 'usn-status available';
                    } else {
                        status.textContent = '✗ USN already registered. Sign in instead.';
                        status.className = 'usn-status taken';
                    }
                } catch (e) {
                    status.textContent = '';
                }
            }, 400);
        });

        async function handleSignin(e) {
            e.preventDefault();
            const usn = document.getElementById('siUsn').value.trim().toUpperCase();
            const phone4 = document.getElementById('siPhone4').value.trim();

            if (!usn || !phone4) return showMsg('Please fill in all fields.', 'error');
            if (usn.length !== 10) return showMsg('USN must be exactly 10 characters.', 'error');
            if (phone4.length !== 4) return showMsg('Enter last 4 digits of your phone.', 'error');

            const btn = document.getElementById('btnSignin');
            btn.disabled = true;
            btn.textContent = 'SIGNING IN...';

            try {
                const resp = await fetch(API + '/api/users/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usn, phone_last4: phone4 })
                });
                const data = await resp.json();
                if (data.success) {
                    data.user._saved_at = Date.now();
                    localStorage.setItem('quest_user', JSON.stringify(data.user));
                    showMsg('Welcome back, ' + data.user.name + '!', 'success');
                    setTimeout(() => window.location.href = '/', 800);
                } else {
                    showMsg(data.message || 'Sign in failed.', 'error');
                }
            } catch (e) {
                showMsg('Connection error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'SIGN IN →';
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('suName').value.trim();
            const usn = document.getElementById('suUsn').value.trim().toUpperCase();
            const phone = document.getElementById('suPhone').value.trim();
            const email = document.getElementById('suEmail').value.trim();
            const terms = document.getElementById('suTerms').checked;

            if (!name || !usn || !phone) return showMsg('Please fill in all required fields.', 'error');
            if (usn.length !== 10) return showMsg('USN must be exactly 10 alphanumeric characters.', 'error');
            if (!terms) return showMsg('Please accept the terms of use.', 'error');

            const btn = document.getElementById('btnSignup');
            btn.disabled = true;
            btn.textContent = 'CREATING ACCOUNT...';

            try {
                const resp = await fetch(API + '/api/users/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, usn, phone, email: email || undefined })
                });
                const data = await resp.json();
                if (data.success) {
                    // Switch to sign-in tab with USN pre-filled
                    switchTab('signin');
                    document.getElementById('siUsn').value = usn;
                    document.getElementById('siPhone4').value = '';
                    document.getElementById('siPhone4').focus();
                    showMsg('Account created! Please sign in with your USN and phone.', 'success');
                } else {
                    showMsg(data.message || 'Signup failed.', 'error');
                }
            } catch (e) {
                showMsg('Connection error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'CREATE ACCOUNT →';
            }
        }
    </script>
</body>
</html>
